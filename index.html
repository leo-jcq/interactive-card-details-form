<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="./style.css">

  <title>Frontend Mentor | Interactive card details form</title>
</head>

<body>

  <!-- Live cards -->
  <div class="live-card" id="front-card">
    <img src="./images/card-logo.svg" alt="">
    <div>
      <span id="card-numbers">0000 0000 0000 0000</span>
      <div>
        <span id="card-holder">Jane Appleseed</span>
        <div>
          <span id="card-exp-month">00</span>
          /
          <span id="card-exp-year">00</span>
        </div>
      </div>
    </div>
  </div>

  <div class="live-card" id="back-card">
    <div>
      <span id="card-cvc">000</span>
    </div>
  </div>

  <img src="./images/bg-main.png" alt="">

  <!-- Right section-->
  <main>
    <!-- Form -->
    <div id="form">
      <div class="form-container" id="name-container">
        <label for="cardholder-name">Cardholder Name</label>
        <input type="text" id="cardholder-name" placeholder="e.g. Jane Appleseed" maxlength="25"
          onkeydown="verify_name()" onkeyup="verify_name()" required>
        <span class="error" id="name-error">Can't be blank</span>
      </div>

      <div class="form-container" id="number-container">
        <label for="card-number">Card Number</label>
        <input type="text" id="card-number" placeholder="e.g. 1234 5678 9123 0000" maxlength="19"
          onkeyup="verify_number()" onkeydown="verify_number()" required>
        <span class="error" id="number-error">Wrong format, number only</span>
      </div>

      <div id="botttom-form">
        <div class="form-container" id="date-container">
          <label for="month">Exp. Date (MM/YY)</label>
          <div>
            <input type="text" id="month" placeholder="MM" maxlength="2" onkeydown="verify_month()"
              onkeyup="verify_month()" required>
            <input type="text" id="year" placeholder="YY" maxlength="2" onkeydown="verify_year()"
              onkeyup="verify_year()" required>
          </div>
          <span class="error" id="date-error">Can't be blank, number only</span>
        </div>

        <div class="form-container" id="cvc-container">
          <label for="cvc">CVC</label>
          <input type="text" id="cvc" placeholder="e.g. 123" maxlength="3" onkeydown="verify_cvc()"
            onkeyup="verify_cvc()" required>
          <span class="error" id="cvc-error">Can't be blank, number only</span>
        </div>
      </div>

      <div id="sendButton">Confirm</div>
    </div>

    <!-- Completed state -->
    <div id="completed-state-container">
      <img src="./images/icon-complete.svg" alt="">
      <p>Thank you!</p>
      <p>We've added your card details</p>
      <button>Continue</button>
    </div>
  </main>

  <!-- Js imports -->
  <script src="./js/name.js"></script>
  <script src="./js/number.js"></script>
  <script src="./js/date.js"></script>
  <script src="./js/cvc.js"></script>
  <!-- Script for submit and reset -->
  <script>
    /**
     * Check that all the fields are correct
     * If they are, display the completed state
     *
     */
    document.getElementById('sendButton').addEventListener('click', () => {
      if (verify_name() && verify_number() && verify_month() && verify_year() && verify_cvc()) {
        document.getElementById('form').style.display = 'none';
        document.getElementById('completed-state-container').style.display = 'grid';
      }
    });

    /**
     * Reset the form :
     * - Hide the completed state and display the form
     * - Reset all the fields
     * - Reset the live cards
     * 
     */
    document.querySelector('#completed-state-container button').addEventListener('click', () => {
      document.getElementById('form').style.display = 'grid';
      document.getElementById('completed-state-container').style.display = 'none';
      document.getElementById('cardholder-name').value = '';
      document.getElementById('card-number').value = '';
      document.getElementById('month').value = '';
      document.getElementById('year').value = '';
      document.getElementById('cvc').value = '';
      document.getElementById('card-numbers').innerHTML = '0000 0000 0000 0000';
      document.getElementById('card-holder').innerHTML = 'Jane Appleseed';
      document.getElementById('card-exp-month').innerHTML = '00';
      document.getElementById('card-exp-year').innerHTML = '00';
      document.getElementById('card-cvc').innerHTML = '000';
    });
  </script>

</body>

</html>
